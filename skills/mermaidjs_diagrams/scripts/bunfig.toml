# Bun runtime configuration for the mermaidjs_diagrams skill scripts.
#
# Coverage threshold enforcement lives in the Makefile (`test-cov-ts` parses
# the "All files" row and fails below 90% aggregate). Bun's own
# `coverageThreshold` bunfig key enforces *per-file* at the time of writing,
# which produced spurious failures when one file was at 82% but the aggregate
# was 91% — intentional overshoot for pragmatism. Keep bun's side enabled
# for reporting, let the Makefile own the gate.

[test]
coverageReporter = ["text"]
coverageSkipTestFiles = true
