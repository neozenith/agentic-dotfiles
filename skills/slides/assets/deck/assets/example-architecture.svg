t;mxCell id=&quot;e1&quot; value=&quot;request&quot; style=&quot;edgeStyle=orthogonalEdgeStyle;rounded=1;strokeColor={{TOKEN_MUTED}};fontColor={{TOKEN_MUTED}};&quot; edge=&quot;1&quot; parent=&quot;1&quot; source=&quot;client&quot; target=&quot;api&quot;&gt;&lt;mxGeometry relative=&quot;1&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;e2&quot; value=&quot;reads&quot; style=&quot;edgeStyle=orthogonalEdgeStyle;rounded=1;strokeColor={{TOKEN_MUTED}};fontColor={{TOKEN_MUTED}};&quot; edge=&quot;1&quot; parent=&quot;1&quot; source=&quot;api&quot; target=&quot;store&quot;&gt;&lt;mxGeometry relative=&quot;1&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;e3&quot; value=&quot;caches&quot; style=&quot;edgeStyle=orthogonalEdgeStyle;rounded=1;dashed=1;strokeColor={{TOKEN_MUTED}};fontColor={{TOKEN_MUTED}};&quot; edge=&quot;1&quot; parent=&quot;1&quot; source=&quot;api&quot; target=&quot;cache&quot;&gt;&lt;mxGeometry relative=&quot;1&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;&lt;/diagram&gt;&lt;/mxfile&gt;">
  <!--
    An editable draw.io document that is ALSO a rendered image.

    The `content` attribute above carries an <mxfile> model, so opening this file
    in diagrams.net gives back real, movable shapes rather than a flat picture.
    Edit it there, save, and the file stays embeddable: the deck references the
    same path. The Makefile lists assets/*.svg as a render prerequisite, so an
    edit here rebuilds the deck.

    Why no background rect: the canvas stays transparent, so the diagram sits on
    any slide colour. Each node carries its own surface chip instead. That is
    deliberate. A transparent canvas plus light labels would be unreadable on
    draw.io's white editing canvas; the chips keep the file legible in both
    places.

    The palette came from the project's design tokens at scaffold time. For
    provider icons (AWS, GCP, Azure, Kubernetes), paste shapes from a draw.io
    stencil pack in the editor, or generate the SVG with a script that inlines
    tinted stencils and writes the same `content` attribute.
  -->
