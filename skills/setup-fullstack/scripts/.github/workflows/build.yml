name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: build + test (both halves)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: bunx --bun playwright install --with-deps chromium

      - name: Run `make ci`
        run: make ci

      - name: Upload e2e artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artefacts-${{ github.run_id }}
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 14
