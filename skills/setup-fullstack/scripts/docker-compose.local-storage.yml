# LocalStorage overlay: enables the backup feature with the filesystem-backed
# `LocalStorage` implementation. No external object-store service needed —
# dumps live in a named volume so they survive container restarts.
#
# Layered on top of docker-compose.yml + docker-compose.postgres.yml when
# DATABASE_BACKEND=postgres and BACKUP_BACKEND=local. Stack via -f.

services:
  backend:
    environment:
      STORAGE_BACKEND: local
      # In-container path; the volume below makes it survive `docker-down`.
      STORAGE_LOCAL_PATH: /app/data/storage
      # Tight default for demos; production would pin much higher (env override OK).
      BACKUP_INTERVAL_SECONDS: "60"
    volumes:
      - local-storage-data:/app/data/storage

volumes:
  local-storage-data:
