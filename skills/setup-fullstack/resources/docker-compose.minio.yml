# MinIO overlay: provides an S3-API-compatible local object store + a small
# init sidecar that creates the bucket on startup.
#
# Layered on top of docker-compose.yml + docker-compose.postgres.yml when
# DATABASE_BACKEND=postgres and BACKUP_BACKEND=minio. Stack the files via -f.
#
# Console UI: http://localhost:9001 (default credentials minioadmin/minioadmin).
# S3 API:     http://localhost:9000

services:
  backend:
    environment:
      STORAGE_BACKEND: s3
      STORAGE_BUCKET: app-backups
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: us-east-1
      # MinIO requires path-style addressing (http://host:port/bucket/key).
      # Virtual-hosted (http://bucket.host) needs DNS entries we don't have.
      S3_ADDRESSING_STYLE: path
      # Tight default for demos; production would pin much higher (env override OK).
      BACKUP_INTERVAL_SECONDS: "60"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      minio-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-fullstack}-minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  # mc-based init: polls MinIO until ready, then creates the bucket.
  # `condition: service_completed_successfully` on the backend means the
  # backend won't start until this exits 0 — guaranteeing the bucket exists.
  minio-init:
    image: minio/mc:latest
    container_name: ${COMPOSE_PROJECT_NAME:-fullstack}-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do
          echo "waiting for minio..."; sleep 1;
        done
        mc mb --ignore-existing local/app-backups
        mc anonymous set none local/app-backups
        echo "minio-init: bucket app-backups ready"

volumes:
  minio-data:
