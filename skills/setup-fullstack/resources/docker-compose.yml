# BASE compose: defines the backend service shape. No DB-specific config.
#
# Stack as layered files via `-f`:
#   docker compose -f docker-compose.yml -f docker-compose.sqlite.yml ...
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml ...
#
# The Makefile builds $(COMPOSE_FILES) from $(DATABASE_BACKEND) (sqlite|postgres),
# so `make docker-up` defaults to sqlite and `make DATABASE_BACKEND=postgres docker-up`
# layers in the postgres service + connection string.
#
# Container listens on 8000; host port is DOCKER_API_PORT (default 8210),
# separate from `make dev` (8200) and `make agentic-dev` (8201) so all three
# can coexist.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-fullstack}-app
    container_name: ${COMPOSE_PROJECT_NAME:-fullstack}-app
    ports:
      - "${DOCKER_API_PORT:-8210}:8000"
    # Pass storage / backup config from the host env. Empty by default —
    # the backup feature stays OFF unless the host explicitly enables it.
    # The minio + local-storage overlays set STORAGE_BACKEND themselves;
    # AWS S3 mode comes from the host setting STORAGE_BACKEND=s3 + creds.
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-auto}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-}
      BACKUP_KEY_PREFIX: ${BACKUP_KEY_PREFIX:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 8s
    restart: unless-stopped
