# Docker Compose: single service that bundles the FastAPI backend + the
# built React SPA. From the project root:
#
#   make docker-build         # build the image (bun + vite build, then uv sync)
#   make docker-up            # start detached, wait for healthcheck, print URL
#   make docker-up-fg         # start in foreground (Ctrl+C to stop)
#   make docker-down          # tear down + remove volume
#   make ci-docker            # full deploy-parity gate (api + e2e against the container)
#
# Container listens on 8000; host port is DOCKER_API_PORT (default 8210),
# separate from `make dev` (8200) and `make agentic-dev` (8201) so all three
# can coexist.

services:
  backend:
    build:
      # Build context = project root (the Dockerfile pulls from frontend/ AND backend/).
      context: .
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-fullstack}-app
    container_name: ${COMPOSE_PROJECT_NAME:-fullstack}-app
    ports:
      - "${DOCKER_API_PORT:-8210}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 8s
    restart: unless-stopped
