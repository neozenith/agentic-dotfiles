# Postgres overlay: adds a postgres service and points the backend at it.
# Layered on top of docker-compose.yml; selected by Makefile when DATABASE_BACKEND=postgres.

services:
  backend:
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-fullstack}-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres-data:
