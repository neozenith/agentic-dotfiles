# SQLite overlay: file-based DB at /app/data/app.db (volume-mounted for persistence).
# Layered on top of docker-compose.yml; selected by Makefile when DATABASE_BACKEND=sqlite (the default).

services:
  backend:
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/app.db
    volumes:
      - sqlite-data:/app/data

volumes:
  sqlite-data:
